[project]
name = "eam-api-tests"
version = "1.0.0"
requires-python = ">=3.11"
dependencies = [
    "pytest>=8.0",
    "httpx>=0.27",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "readonly: GET-only tests that do not modify data",
    "write: Tests that create/update/delete data",
    "priority1: BCM/BCPF/CMDB endpoints with Playwright coverage",
    "priority2: Core CRUD routes",
    "priority3: Supporting routes",
]
